<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chicago Crime Visualization</title>
  <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css' />
  <script src='https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js'></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crossfilter2/1.5.4/crossfilter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="global-loader">
    <div class="loader-content">
      <div class="progress-wrapper">
        <div class="progress-bar-bg">
          <div id="loader-progress" class="progress-bar-fill"></div>
        </div>
      </div>
      <h2 style="margin: 15px 0 5px 0; color: #fff;">Website Initializing</h2>
      <p id="loader-text" style="color: #94a3b8; font-size: 14px; margin: 0;">Connecting to data stream...</p>
    </div>
  </div>

  <div class="top-title-bar">
    Chicago <span style="color: #60a5fa;"> CRIME </span> Visualization
  </div>

  <div class="dashboard-layout">
    <div class="left-panel">
      <div id="map">
        <div id="severity-legend" class="map-legend">
          <h4>Severity</h4>
          <div class="legend-scale">
            <div class="legend-item"><span style="background: #d73027;"></span> Very Dangerous</div>
            <div class="legend-item"><span style="background: #fc8d59;"></span> Dangerous</div>
            <div class="legend-item"><span style="background: #fee08b;"></span> Normal</div>
            <div class="legend-item"><span style="background: #a6d96a;"></span> Safe</div>
            <div class="legend-item"><span style="background: #1a9850;"></span> Very Safe</div>
            <div class="legend-item" style="margin-top: 4px; padding-top: 5px; border-top: 1px solid #334155;">
              <span style="background: #5e636a; border: 1px solid #5e636a;"></span> No Data
            </div>
          </div>
        </div>
      </div>
      <div id="bottom-panel">
        <div id="year-slider-group" class="filter-group horizontal-slider">
          <label>YEAR <span id="year-label" class="highlight-text">2020 - 2026</span></label>
          <div id="year-chart" class="chart-canvas" style="height: 80px;"></div>
        </div>
        <div id="month-slider-group" class="filter-group horizontal-slider">
          <label>MONTH <span id="month-label" class="highlight-text">JAN - DEC</span></label>
          <div id="month-chart" class="chart-canvas" style="height: 80px;"></div>
        </div>
        <div id="time-slider-group" class="filter-group horizontal-slider">
          <label>TIME OF DAY <span id="time-label" class="highlight-text">00:00 - 24:00</span></label>
          <div id="time-chart" class="chart-canvas" style="height: 80px;"></div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="panel-title">Crime Types</div>
      
      <div class="weight-bar-container">
        <div class="weight-bar-header">
          <div class="weight-bar-label">Crime Severity Weights</div>
          <button id="reset-weights-btn" class="reset-btn" title="Reset weights equally">↺ RESET</button>
        </div>
        <div id="weight-bar" class="weight-bar" title="Drag a color dot here, or scroll on a color to adjust weight"></div>
      </div>

      <div class="checkbox-list" id="checkbox-list-container" style="height: 485px;">
        <label id="select-all-label" class="merged-legend-item" style="font-weight: bold; color: #f8fafc;">
          <input type="checkbox" id="select-all-checkbox" checked> Select All
        </label>
      
        <div class="legend-row" data-type="THEFT">
            <label class="merged-legend-item">
              <div class="legend-item-left"><input type="checkbox" class="crime-checkbox" value="THEFT" checked><div class="legend-color" style="background:#1f77b4;" draggable="true" data-type="THEFT"></div><span>THEFT</span></div>
              <div class="legend-count-wrap"><div class="legend-count-bar"><div class="legend-count-fill" style="background:#1f77b4;"></div></div><span class="legend-count-num">—</span></div>
            </label>
        </div>
      
        <div class="legend-row" data-type="BATTERY">
            <label class="merged-legend-item">
              <div class="legend-item-left"><input type="checkbox" class="crime-checkbox" value="BATTERY" checked><div class="legend-color" style="background:#ff7f0e;" draggable="true" data-type="BATTERY"></div><span>BATTERY</span></div>
              <div class="legend-count-wrap"><div class="legend-count-bar"><div class="legend-count-fill" style="background:#ff7f0e;"></div></div><span class="legend-count-num">—</span></div>
            </label>
        </div>
      
        <div class="legend-row" data-type="CRIMINAL DAMAGE">
            <label class="merged-legend-item">
              <div class="legend-item-left"><input type="checkbox" class="crime-checkbox" value="CRIMINAL DAMAGE" checked><div class="legend-color" style="background:#ffbb78;" draggable="true" data-type="CRIMINAL DAMAGE"></div><span>CRIMINAL DAMAGE</span></div>
              <div class="legend-count-wrap"><div class="legend-count-bar"><div class="legend-count-fill" style="background:#ffbb78;"></div></div><span class="legend-count-num">—</span></div>
            </label>
        </div>
      
        <div class="legend-row" data-type="NARCOTICS">
            <label class="merged-legend-item">
              <div class="legend-item-left"><input type="checkbox" class="crime-checkbox" value="NARCOTICS" checked><div class="legend-color" style="background:#2ca02c;" draggable="true" data-type="NARCOTICS"></div><span>NARCOTICS</span></div>
              <div class="legend-count-wrap"><div class="legend-count-bar"><div class="legend-count-fill" style="background:#2ca02c;"></div></div><span class="legend-count-num">—</span></div>
            </label>
        </div>
      
        <div class="legend-row" data-type="ASSAULT">
            <label class="merged-legend-item">
              <div class="legend-item-left"><input type="checkbox" class="crime-checkbox" value="ASSAULT" checked><div class="legend-color" style="background:#d62728;" draggable="true" data-type="ASSAULT"></div><span>ASSAULT</span></div>
              <div class="legend-count-wrap"><div class="legend-count-bar"><div class="legend-count-fill" style="background:#d62728;"></div></div><span class="legend-count-num">—</span></div>
            </label>
        </div>
      
        <div class="legend-row" data-type="BURGLARY">
            <label class="merged-legend-item">
              <div class="legend-item-left"><input type="checkbox" class="crime-checkbox" value="BURGLARY" checked><div class="legend-color" style="background:#9467bd;" draggable="true" data-type="BURGLARY"></div><span>BURGLARY</span></div>
              <div class="legend-count-wrap"><div class="legend-count-bar"><div class="legend-count-fill" style="background:#9467bd;"></div></div><span class="legend-count-num">—</span></div>
            </label>
        </div>
      
        <div class="legend-row" data-type="ROBBERY">
            <label class="merged-legend-item">
              <div class="legend-item-left"><input type="checkbox" class="crime-checkbox" value="ROBBERY" checked><div class="legend-color" style="background:#8c564b;" draggable="true" data-type="ROBBERY"></div><span>ROBBERY</span></div>
              <div class="legend-count-wrap"><div class="legend-count-bar"><div class="legend-count-fill" style="background:#8c564b;"></div></div><span class="legend-count-num">—</span></div>
            </label>
        </div>
      
        <div class="legend-row" data-type="MOTOR VEHICLE THEFT">
            <label class="merged-legend-item">
              <div class="legend-item-left"><input type="checkbox" class="crime-checkbox" value="MOTOR VEHICLE THEFT" checked><div class="legend-color" style="background:#e377c2;" draggable="true" data-type="MOTOR VEHICLE THEFT"></div><span>MOTOR VEHICLE THEFT</span></div>
              <div class="legend-count-wrap"><div class="legend-count-bar"><div class="legend-count-fill" style="background:#e377c2;"></div></div><span class="legend-count-num">—</span></div>
            </label>
        </div>
      
        <div class="legend-row" data-type="HOMICIDE">
            <label class="merged-legend-item">
              <div class="legend-item-left"><input type="checkbox" class="crime-checkbox" value="HOMICIDE" checked><div class="legend-color" style="background:#00ffff;" draggable="true" data-type="HOMICIDE"></div><span>HOMICIDE</span></div>
              <div class="legend-count-wrap"><div class="legend-count-bar"><div class="legend-count-fill" style="background:#00ffff;"></div></div><span class="legend-count-num">—</span></div>
            </label>
        </div>
      
        <div class="legend-row" data-type="OTHER" id="other-row">
            <label class="merged-legend-item">
              <div class="legend-item-left">
                  <div id="other-toggle" style="cursor:pointer; display:flex; align-items:center; justify-content:center; width:16px; height:16px; margin-right:4px;">
                      <svg id="other-toggle-icon" viewBox="0 0 24 24" stroke="var(--text-tertiary)" stroke-width="3" fill="none" style="width:10px; height:10px; transition:0.3s; pointer-events:none;"><polyline points="9 18 15 12 9 6"></polyline></svg>
                  </div>
                  <input type="checkbox" class="crime-checkbox" value="OTHER" checked id="other-checkbox-main">
                  <div class="legend-color" style="background:#7f7f7f;" draggable="true" data-type="OTHER"></div>
                  <span>OTHER</span>
              </div>
              <div class="legend-count-wrap"><div class="legend-count-bar"><div class="legend-count-fill" style="background:#7f7f7f;"></div></div><span class="legend-count-num">—</span></div>
            </label>
            <div id="other-sub-list" style="display:none; flex-direction:column; background:rgba(0,0,0,0.15); border-top:1px solid rgba(30,58,95,0.4); padding-bottom:6px;">
            </div>
        </div>
      </div>

    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
